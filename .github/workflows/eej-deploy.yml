name: Auto-Deploy EEJ Mobile
on:
  push:
    branches: [ master ]
    paths: [ 'eej-mobile-HIDDEN/**', 'packages/**' ]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v3
        with: { version: 8 }
      - run: pnpm install --no-frozen-lockfile
      - name: Build and Locate Output
        run: |
          pnpm --filter eej-mobile-HIDDEN build
          mkdir -p docs
          # Scan for common mobile build outputs (dist, build, web-build)
          SEARCH_PATH=$(find eej-mobile-HIDDEN -type d -name "dist" -o -name "build" -o -name "web-build" | head -n 1)
          if [ -n "$SEARCH_PATH" ]; then
            cp -r $SEARCH_PATH/* docs/
          else
            echo "Build folder not found!" && exit 1
          fi
          touch docs/.nojekyll
      - name: Deploy
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "deploy: update live site" || echo "No changes"
          git push
