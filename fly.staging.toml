# fly.staging.toml — EEJ (Euro Edu Jobs) API — STAGING
# Deploy from REPO ROOT (where this file lives):
#   ~/.fly/bin/flyctl deploy --config fly.staging.toml --app eej-api
# Build context must be repo root so the monorepo workspace is visible to
# pnpm install inside the container (lib/api-zod, lib/db, etc.).

app = 'eej-api'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[env]
  NODE_ENV = 'staging'

[http_service]
  internal_port = 8080
  force_https = true
  # Staging auto-stop disabled permanently (audit response, 2026-05-14).
  # Pre-fix: auto_stop_machines = true caused 4 work interruptions in one day —
  # the staging machine would idle-stop mid-task, surfacing as "Workers tab
  # empty" / "can't connect" false alarms. Per-machine `flyctl --autostop=off`
  # resets on every deploy because the toml is authoritative. Setting it false
  # here makes the change durable. min_machines_running stays 0 (staging only
  # boots when traffic hits — we don't pay for idle), but once boot, stays up.
  # Production fly.toml is already correct (auto_stop=false, min_running=1).
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthz"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
