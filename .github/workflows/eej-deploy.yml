
name: Auto-Deploy EEJ Mobile

on:
  push:
    branches:
      - master  # This wakes up the engine for EVERY push to master

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install pnpm
        uses: pnpm/action-setup@v3
        with:
          version: 8

      - name: Install Dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Build EEJ Mobile
        run: pnpm --filter eej-mobile-HIDDEN build

      - name: Smart Copy to Docs
        run: |
          mkdir -p docs
          rm -rf docs/*
          # Find the build folder wherever it is hiding
          TARGET=$(find . -type d \( -name "dist" -o -name "build" -o -name "web-build" \) -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$TARGET" ]; then echo "Build folder not found" && exit 1; fi
          cp -r $TARGET/* docs/
          touch docs/.nojekyll
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "deploy: update live site" || echo "No changes"
          git push
