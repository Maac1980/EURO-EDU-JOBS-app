# fly.staging.toml — EEJ (Euro Edu Jobs) API — STAGING
# Deploy: flyctl deploy --config fly.staging.toml --app eej-api

app = 'eej-api'
primary_region = 'ams'

[build]

[env]
  NODE_ENV = 'staging'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthz"

[[vm]]
  memory = '512mb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 512
