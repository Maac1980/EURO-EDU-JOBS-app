# fly.toml — EEJ (Euro Edu Jobs) API — PRODUCTION
# Deploy: flyctl deploy -a eej-jobs-api
# Staging deploys use fly.staging.toml against the eej-api app.

app = 'eej-jobs-api'
primary_region = 'ams'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthz"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
