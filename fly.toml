# fly.toml — EEJ (Euro Edu Jobs) API — PRODUCTION
# Deploy from REPO ROOT (where this fly.toml lives):
#   ~/.fly/bin/flyctl deploy -a eej-jobs-api
# Do NOT cd into artifacts/api-server/ first — the Docker build context must be
# the repo root so the monorepo workspace (pnpm-workspace.yaml + lib/api-zod
# etc.) is visible to pnpm install inside the container.
# Staging deploys use fly.staging.toml against the eej-api app.

app = 'eej-jobs-api'
primary_region = 'ams'

[build]
  dockerfile = "Dockerfile"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/healthz"

[[vm]]
  memory = '1gb'
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
