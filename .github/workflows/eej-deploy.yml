name: Auto-Deploy EEJ Mobile
on:
  push:
    branches: [ master ]
permissions:
  contents: write
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - uses: pnpm/action-setup@v3
        with: { version: 8 }
      - run: pnpm install --no-frozen-lockfile
      - name: Build and Auto-Locate
        run: |
          pnpm --filter eej-mobile-HIDDEN build
          mkdir -p docs
          TARGET=$(find . -type d \( -name "dist" -o -name "build" -o -name "web-build" \) -not -path "*/node_modules/*" | head -n 1)
          if [ -z "$TARGET" ]; then echo "Build folder not found" && exit 1; fi
          cp -r $TARGET/* docs/
          touch docs/.nojekyll
      - name: Deploy
        run: |
          git config --global user.name "GitHub Actions"
          git config --global user.email "actions@github.com"
          git add docs/
          git commit -m "deploy: update live site" || echo "No changes"
          git push
